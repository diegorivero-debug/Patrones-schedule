<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗓️ Patrones de Schedule - Dashboard</title>
<style>
  :root {
    --primary: #1a1a2e;
    --primary-light: #16213e;
    --accent: #2b6cb0;
    --accent-light: #bee3f8;
    --surface: #fff;
    --surface-alt: #f7fafc;
    --bg: #f0f2f5;
    --border: #e2e8f0;
    --text: #2d3748;
    --text-muted: #718096;
    --text-light: #a0aec0;
    --lead-bg: #ebf8ff;
    --lead-text: #2b6cb0;
    --lead-shift: #2c5282;
    --mgr-bg: #fffaf0;
    --mgr-text: #c05621;
    --mgr-shift: #9c4221;
    --green: #276749;
    --red: #e53e3e;
    --orange: #dd6b20;
    --yellow: #d69e2e;
    --slot-w: 44px;
    --col-role-w: 78px;
    --col-shift-w: 106px;
    --radius: 8px;
    --shadow: 0 1px 4px rgba(0,0,0,0.12);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.18);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ─────────────────────────────────────────── */
  header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: #fff; padding: 16px 24px 12px; box-shadow: 0 2px 8px rgba(0,0,0,.3); position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 1.35rem; font-weight: 700; }
  header p  { font-size: .8rem; color: var(--text-light); margin-top: 2px; }

  /* ── Tabs bar ───────────────────────────────────────── */
  .tabs-bar { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; flex-wrap: wrap; gap: 6px; }
  .tabs { display: flex; gap: 0; }
  .tab-btn { padding: 11px 18px; border: none; background: transparent; cursor: pointer; font-size: .86rem; font-weight: 500; color: var(--text-muted); border-bottom: 3px solid transparent; transition: .2s; white-space: nowrap; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

  .action-btns { display: flex; gap: 6px; padding: 6px 0; flex-wrap: wrap; }
  .action-btns button { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: .8rem; font-weight: 600; color: #4a5568; transition: .15s; white-space: nowrap; }
  .action-btns button:hover { background: #edf2f7; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .btn-export { color: var(--green) !important; border-color: #9ae6b4 !important; }
  .btn-reset  { color: #9b2c2c !important; border-color: #feb2b2 !important; }
  .btn-add    { color: var(--accent) !important; border-color: var(--accent-light) !important; }
  .btn-gen    { color: #553c9a !important; border-color: #d6bcfa !important; }
  .btn-rules  { color: #b7791f !important; border-color: #fefcbf !important; }

  /* ── Main ────────────────────────────────────────────── */
  .main { padding: 16px 24px 40px; }

  /* ── Alerts ──────────────────────────────────────────── */
  .alerts-container { margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; }
  .alert { padding: 8px 14px; border-radius: 6px; font-size: .82rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .alert-red    { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
  .alert-orange { background: #fffaf0; color: #c05621; border: 1px solid #fbd38d; }
  .alert-yellow { background: #fffff0; color: #975a16; border: 1px solid #fefcbf; }
  .alert .dismiss { margin-left: auto; cursor: pointer; opacity: .6; font-size: 1.1rem; background: none; border: none; color: inherit; }
  .alert .dismiss:hover { opacity: 1; }

  /* ── Tables ──────────────────────────────────────────── */
  .table-wrapper { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); background: var(--surface); }
  table { border-collapse: collapse; width: max-content; min-width: 100%; font-size: 11px; }
  th, td { border: 1px solid var(--border); text-align: center; vertical-align: middle; padding: 0; }

  .col-role, .col-shift { position: sticky; z-index: 3; background: var(--surface); }
  .col-role  { left: 0; min-width: var(--col-role-w); max-width: var(--col-role-w); width: var(--col-role-w); }
  .col-shift { left: var(--col-role-w); min-width: var(--col-shift-w); max-width: var(--col-shift-w); width: var(--col-shift-w); }
  .col-shift::after { content: ''; position: absolute; top: 0; right: -4px; width: 4px; height: 100%; background: linear-gradient(to right,rgba(0,0,0,.08),transparent); pointer-events: none; }

  thead tr.header-row th { background: var(--text); color: #fff; font-weight: 700; font-size: 10px; padding: 5px 3px; }
  thead tr.header-row th.col-role, thead tr.header-row th.col-shift { background: var(--text); color: #fff; z-index: 5; }
  th.time-slot { min-width: var(--slot-w); width: var(--slot-w); height: 54px; padding: 0; vertical-align: bottom; }
  th.time-slot .rw { display: flex; align-items: flex-end; justify-content: center; height: 54px; padding-bottom: 3px; }
  th.time-slot span { display: inline-block; transform: rotate(-45deg); transform-origin: bottom center; white-space: nowrap; font-size: 9px; font-weight: 600; color: #e2e8f0; line-height: 1; }

  tr.apertura-row td { height: 18px; font-size: 9px; font-weight: 700; }
  tr.apertura-row td.open-slot { background: #f0fff4; color: var(--green); }
  tr.apertura-row td.col-role, tr.apertura-row td.col-shift { background: var(--surface-alt); color: var(--text-muted); font-size: 9px; font-weight: 600; }

  tr.section-sep td { height: 4px; background: #4a5568; border: none; }
  tr.section-sep td.col-role, tr.section-sep td.col-shift { background: #4a5568; }

  tr.lead-row td.col-role  { background: var(--lead-bg); color: var(--lead-text); font-weight: 700; }
  tr.lead-row td.col-shift { background: var(--lead-bg); color: var(--lead-shift); }
  tr.mgr-row  td.col-role  { background: var(--mgr-bg); color: var(--mgr-text); font-weight: 700; }
  tr.mgr-row  td.col-shift { background: var(--mgr-bg); color: var(--mgr-shift); }
  tr.lead-row td.col-role, tr.lead-row td.col-shift, tr.mgr-row td.col-role, tr.mgr-row td.col-shift { padding: 4px 6px; font-size: 11px; text-align: left; }

  td.act-cell { min-width: var(--slot-w); width: var(--slot-w); height: 26px; cursor: pointer; font-size: 9.5px; font-weight: 600; padding: 2px 1px; transition: filter .15s, box-shadow .15s; position: relative; user-select: none; }
  td.act-cell:hover { filter: brightness(.88); box-shadow: inset 0 0 0 2px rgba(0,0,0,.25); z-index: 2; }

  .act-select-wrap { position: absolute; top: 0; left: 0; z-index: 50; }
  .act-select { font-size: 10px; padding: 1px 2px; border: 2px solid var(--accent); background: #fff; cursor: pointer; min-width: 72px; border-radius: 3px; box-shadow: var(--shadow-lg); }

  tr.group-label-row td { background: #edf2f7; color: #4a5568; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 3px 6px; text-align: left; }

  /* ── Summary ─────────────────────────────────────────── */
  .summary-section { margin-top: 16px; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow-x: auto; }
  .summary-section h3 { font-size: .86rem; font-weight: 700; padding: 10px 14px 8px; color: var(--text); border-bottom: 1px solid var(--border); background: var(--surface-alt); border-radius: var(--radius) var(--radius) 0 0; }
  table.summary-table { width: max-content; min-width: 100%; }
  .summary-table th.sum-label, .summary-table td.sum-label { position: sticky; left: 0; z-index: 3; min-width: 140px; max-width: 140px; width: 140px; text-align: left; padding: 5px 8px; font-size: 11px; font-weight: 600; background: var(--surface-alt); border: 1px solid var(--border); white-space: nowrap; }
  .summary-table th.sum-label::after, .summary-table td.sum-label::after { content: ''; position: absolute; top: 0; right: -4px; width: 4px; height: 100%; background: linear-gradient(to right,rgba(0,0,0,.06),transparent); pointer-events: none; }
  .summary-table th { background: var(--text); color: #fff; font-size: 9px; padding: 4px 2px; min-width: var(--slot-w); width: var(--slot-w); }
  .summary-table th.sum-label { background: var(--text); color: #e2e8f0; z-index: 5; }
  .summary-table td.sum-val { text-align: center; font-size: 11px; padding: 4px 2px; min-width: var(--slot-w); width: var(--slot-w); border: 1px solid var(--border); }
  .summary-table tr:nth-child(odd) td { background: var(--surface-alt); }
  .summary-table tr:nth-child(even) td { background: var(--surface); }
  tr.sum-sep td { height: 3px; background: #a0aec0; border: none; }
  tr.sum-sep td.sum-label { background: #a0aec0; }
  tr.sum-total td { background: var(--lead-bg) !important; font-weight: 700; }
  tr.sum-total td.sum-label { background: var(--accent-light) !important; color: var(--lead-shift); }
  td.sum-zero { color: #cbd5e0; }
  td.sum-pos  { color: var(--green); font-weight: 700; }
  td.sum-alert { color: var(--red); font-weight: 700; background: #fff5f5 !important; }

  /* ── Legend ───────────────────────────────────────────── */
  .legend { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; background: var(--surface); border-radius: var(--radius); padding: 10px 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: #4a5568; }
  .legend-swatch { width: 18px; height: 18px; border-radius: 3px; border: 1px solid rgba(0,0,0,.15); flex-shrink: 0; }

  /* ── Rules section ───────────────────────────────────── */
  .rules-section { margin-top: 16px; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px; }
  .rules-section h3 { font-size: .86rem; font-weight: 700; color: var(--text); margin-bottom: 10px; }
  .rule-card { background: var(--surface-alt); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; font-size: .84rem; }
  .rule-card.highlighted { border-color: #f6e05e; background: #fffff0; box-shadow: inset 0 0 0 1px #f6e05e; }
  .rule-card .rule-day { font-weight: 700; color: var(--accent); min-width: 70px; flex-shrink: 0; font-size: .78rem; text-transform: uppercase; padding-top: 1px; }
  .rule-card .rule-text { flex: 1; color: var(--text); }
  .rule-card .rule-delete { background: none; border: none; cursor: pointer; color: #e53e3e; font-size: 1.1rem; opacity: .6; padding: 0 4px; }
  .rule-card .rule-delete:hover { opacity: 1; }
  .no-rules { color: var(--text-muted); font-size: .84rem; font-style: italic; }

  /* ── Modal ───────────────────────────────────────────── */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.45); backdrop-filter: blur(3px); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 12px; box-shadow: var(--shadow-lg); padding: 24px; width: 420px; max-width: 90vw; max-height: 85vh; overflow-y: auto; }
  .modal h2 { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 16px; }
  .modal label { display: block; font-size: .84rem; font-weight: 600; color: #4a5568; margin-bottom: 4px; margin-top: 12px; }
  .modal select, .modal input, .modal textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: .88rem; font-family: inherit; }
  .modal textarea { min-height: 70px; resize: vertical; }
  .modal .modal-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
  .modal .modal-actions button { padding: 8px 18px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: .86rem; font-weight: 600; transition: .15s; }
  .modal .modal-actions .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal .modal-actions .btn-primary:hover { background: #2c5282; }
  .modal .modal-actions .btn-cancel { color: var(--text-muted); }
  .modal .modal-actions .btn-cancel:hover { background: #edf2f7; }
  .modal .cb-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .modal .cb-row input[type=checkbox] { width: auto; }

  /* ── Season Toggle ─────────────────────────────────── */
  .header-row-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .season-toggle { display: flex; align-items: center; gap: 0; background: rgba(255,255,255,.1); border-radius: 20px; overflow: hidden; }
  .season-btn { padding: 5px 14px; border: none; background: transparent; color: rgba(255,255,255,.55); cursor: pointer; font-size: .78rem; font-weight: 600; transition: .2s; }
  .season-btn:hover { color: rgba(255,255,255,.85); }
  .season-btn.active { background: rgba(255,255,255,.2); color: #fff; }
  .theme-btn { background: rgba(255,255,255,.1); border: none; color: rgba(255,255,255,.65); padding: 5px 10px; border-radius: 16px; cursor: pointer; font-size: .78rem; transition: .2s; }
  .theme-btn:hover { background: rgba(255,255,255,.2); color: #fff; }

  /* ── Quick Stats ──────────────────────────────────── */
  .quick-stats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .stat-card { flex: 1; min-width: 100px; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 10px 12px; text-align: center; }
  .stat-value { font-size: 1.3rem; font-weight: 800; color: var(--accent); line-height: 1.1; }
  .stat-value.danger { color: var(--red); }
  .stat-label { font-size: .68rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }

  /* ── Delete row button ──────────────────────────────── */
  .col-actions { position: sticky; right: 0; z-index: 3; min-width: 28px; max-width: 28px; width: 28px; background: var(--surface); border: 1px solid var(--border); padding: 0; }
  .del-btn { background: none; border: none; cursor: pointer; color: #e53e3e; font-size: 12px; opacity: .3; transition: .15s; line-height: 1; padding: 2px; }
  .del-btn:hover { opacity: 1; transform: scale(1.3); }
  thead .col-actions { background: var(--text); }
  tr.apertura-row .col-actions { background: var(--surface-alt); }
  tr.group-label-row .col-actions, tr.section-sep .col-actions { background: transparent; border-color: transparent; }

  /* ── Heatmap cells ──────────────────────────────────── */
  td.sum-heat-low  { background: #f0fff4 !important; }
  td.sum-heat-med  { background: #c6f6d5 !important; }
  td.sum-heat-high { background: #9ae6b4 !important; }
  td.sum-heat-max  { background: #68d391 !important; color: #22543d !important; }

  /* ── Dark mode ─────────────────────────────────────── */
  body.dark {
    --primary: #0d1117; --primary-light: #161b22; --accent: #58a6ff; --accent-light: #1f3a5f;
    --surface: #161b22; --surface-alt: #1c2128; --bg: #0d1117; --border: #30363d;
    --text: #c9d1d9; --text-muted: #8b949e; --text-light: #484f58;
    --lead-bg: #0d2240; --lead-text: #58a6ff; --lead-shift: #79c0ff;
    --mgr-bg: #2a1800; --mgr-text: #d29922; --mgr-shift: #e3b341;
    --green: #3fb950; --red: #f85149; --orange: #d29922; --yellow: #e3b341;
  }
  body.dark thead tr.header-row th { background: #21262d; }
  body.dark tr.section-sep td, body.dark tr.section-sep td.col-role, body.dark tr.section-sep td.col-shift { background: #30363d; }
  body.dark tr.group-label-row td { background: #1c2128; color: #8b949e; }
  body.dark tr.apertura-row td.open-slot { background: #0d2818; color: #3fb950; }
  body.dark .summary-table th { background: #21262d; }
  body.dark .summary-table th.sum-label { background: #21262d; }
  body.dark td.sum-zero { color: #30363d; }
  body.dark td.sum-alert { color: #f85149; background: #3d1214 !important; }
  body.dark tr.sum-total td { background: #0d2240 !important; }
  body.dark tr.sum-total td.sum-label { background: #1f3a5f !important; color: #79c0ff; }
  body.dark tr.sum-sep td, body.dark tr.sum-sep td.sum-label { background: #484f58; }
  body.dark .rule-card { background: var(--surface-alt); border-color: var(--border); }
  body.dark .rule-card.highlighted { border-color: #6e5a08; background: #1c1800; }
  body.dark .modal { background: var(--surface); }
  body.dark .modal h2, body.dark .modal label { color: var(--text); }
  body.dark .modal select, body.dark .modal input, body.dark .modal textarea { background: var(--surface-alt); color: var(--text); border-color: var(--border); }
  body.dark td.sum-heat-low  { background: #0d2818 !important; }
  body.dark td.sum-heat-med  { background: #10351e !important; }
  body.dark td.sum-heat-high { background: #134424 !important; }
  body.dark td.sum-heat-max  { background: #16522c !important; color: #7ee787 !important; }

  /* ── Print ──────────────────────────────────────────── */
  @media print {
    header { position: static; box-shadow: none; }
    .action-btns, .theme-btn, .del-btn, .col-actions, .alert .dismiss { display: none !important; }
    .tab-btn { display: none; }
    .tab-btn.active { display: inline-block; font-size: 1rem; border: none; }
    .main { padding: 8px; }
    .table-wrapper, .summary-section, .stat-card, .rules-section { box-shadow: none; }
    .stat-card { border: 1px solid #ccc; }
    .quick-stats { gap: 4px; }
  }

  /* ── Footer ────────────────────────────────────────── */
  .footer { text-align: center; padding: 12px 24px; font-size: .75rem; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 20px; background: var(--surface); }
</style>
</head>
<body>
<header>
  <div class="header-row-top">
    <div>
      <h1>🗓️ Patrones de Schedule - Dashboard</h1>
      <p id="subtitle">Selecciona un patrón para visualizar</p>
    </div>
    <div class="header-controls">
      <div class="season-toggle">
        <button class="season-btn active" data-season="verano" onclick="switchSeason('verano')">☀️ Verano</button>
        <button class="season-btn" data-season="invierno" onclick="switchSeason('invierno')">❄️ Invierno</button>
      </div>
      <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()">🌙 Oscuro</button>
    </div>
  </div>
</header>

<div class="tabs-bar">
  <div class="tabs">
    <button class="tab-btn active" data-pat="0">Día Normal</button>
    <button class="tab-btn"        data-pat="1">Martes</button>
    <button class="tab-btn"        data-pat="2">Miércoles</button>
    <button class="tab-btn"        data-pat="3">Sábado</button>
  </div>
  <div class="action-btns">
    <button class="btn-add"    onclick="openAddFigure()">➕ Añadir Figura</button>
    <button class="btn-gen"    onclick="openGenerate()">⚙️ Generar Patrón</button>
    <button class="btn-rules"  onclick="openRules()">📋 Reglas</button>
    <button class="btn-export" onclick="exportCSV()">⬇️ Exportar CSV</button>
    <button class="btn-export" onclick="window.print()">🖨️ Imprimir</button>
    <button class="btn-reset"  onclick="resetPattern()">🔄 Reset</button>
  </div>
</div>

<div class="main">
  <div id="alerts-container" class="alerts-container"></div>
  <div id="quick-stats" class="quick-stats"></div>
  <div id="schedule-container"></div>
</div>

<!-- Add Figure Modal -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <h2>➕ Añadir Figura</h2>
    <label>Rol</label>
    <select id="add-role"><option value="Manager">Manager</option><option value="Lead">Lead</option></select>
    <label>Turno</label>
    <select id="add-shift">
      <option value="07:00-16:00">07:00 - 16:00</option>
      <option value="08:00-17:00">08:00 - 17:00</option>
      <option value="09:00-18:00">09:00 - 18:00</option>
      <option value="10:00-19:00">10:00 - 19:00</option>
      <option value="11:00-20:00">11:00 - 20:00</option>
      <option value="13:00-22:00">13:00 - 22:00 (Verano)</option>
      <option value="13:00-21:30">13:00 - 21:30 (Invierno)</option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-add')">Cancelar</button>
      <button class="btn-primary" onclick="addFigure()">Añadir</button>
    </div>
  </div>
</div>

<!-- Generate Pattern Modal -->
<div class="modal-overlay" id="modal-gen">
  <div class="modal">
    <h2>⚙️ Generar Patrón</h2>
    <p style="font-size:.88rem;color:#4a5568;margin-bottom:12px;">
      Se generará automáticamente un patrón respetando los turnos, las reglas de cobertura y las reuniones existentes.
    </p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-gen')">Cancelar</button>
      <button class="btn-primary" onclick="generatePattern()">Generar</button>
    </div>
  </div>
</div>

<!-- Rules Modal -->
<div class="modal-overlay" id="modal-rules">
  <div class="modal">
    <h2>📋 Añadir Regla / Nota</h2>
    <label>Día aplicable</label>
    <select id="rule-day">
      <option value="Todos">Todos los días</option>
      <option value="Lunes">Lunes</option>
      <option value="Martes">Martes</option>

// Same rules & structure, just shorter evening shift
// ═══════════════════════════════════════════════════════════════════════════════
function deriveWinterPatterns(summer) {
  return summer.map(pat => pat.map(row => {
    const r = {role: row.role, shift: row.shift, acts: [...row.acts]};
    if (row.shift === '13:00-22:00') {
      r.shift = '13:00-21:30';
      // Remove last slot (22:00) and second-to-last (21:30) assignment
      r.acts[31] = '';  // 22:00
      r.acts[30] = '';  // 21:30
    }
    return r;
  }));
}

function getColor(act) { return COLORS.hasOwnProperty(act) ? COLORS[act] : '#FFFFFF'; }

// XSS-safe HTML escape
function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function textColor(hex) {
  if (typeof hex !== 'string' || !/^#[0-9A-Fa-f]{6}$/.test(hex)) return '#333';
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return (.299*r+.587*g+.114*b)>160?'#333':'#fff';
}

function shiftIndices(shift) {
  const [s,e] = shift.split('-');
  let si = TIME_SLOTS.indexOf(s), ei = TIME_SLOTS.indexOf(e);
  if (si<0) si=0; if (ei<0) ei=TIME_SLOTS.length-1;
  return [si, ei];
}

// ALERTS / VALIDATION
// ═══════════════════════════════════════════════════════════════════════════════
function validatePattern(patIdx) {
  const rows = currentState[patIdx];
  const n = TIME_SLOTS.length;
  const alerts = [];
  const counts = {Coach:new Array(n).fill(0), Support:new Array(n).fill(0), LDSup:new Array(n).fill(0), Lunch:new Array(n).fill(0), Floor:new Array(n).fill(0)};

  for (const row of rows) {
    for (let c=0; c<n; c++) {
      const a = row.acts[c];
      if (a==='Coach')   { counts.Coach[c]++; counts.Floor[c]++; }
      if (a==='Support') { counts.Support[c]++; counts.Floor[c]++; }
      if (a==='LDSup')   { counts.LDSup[c]++; counts.Floor[c]++; }
      if (a==='Lunch')   counts.Lunch[c]++;
    }
  }

  for (let c=OPEN_START; c<=getOpenEnd(); c++) {
    if (counts.Floor[c]===0) alerts.push({type:'red',msg:`⚠️ Sin cobertura en floor a las ${TIME_SLOTS[c]}`});
    if (counts.Coach[c]===0 && counts.Support[c]===0 && counts.LDSup[c]===0) alerts.push({type:'red',msg:`🚨 Sin Coach ni Support a las ${TIME_SLOTS[c]}`});
    if (counts.Lunch[c]>3) alerts.push({type:'orange',msg:`🍽️ Demasiadas personas en Lunch a las ${TIME_SLOTS[c]} (${counts.Lunch[c]})`});
  }

  // Check meeting alignment
  const meetingSlots = {};
  for (const row of rows) {
    const mySlots = [];
    for (let c=0; c<n; c++) { if (row.acts[c]==='MEETING') mySlots.push(c); }
    if (mySlots.length>0) {
      const key = mySlots.join(',');
      meetingSlots[key] = (meetingSlots[key]||0)+1;
    }
  }
  if (Object.keys(meetingSlots).length>1) {
    alerts.push({type:'red',msg:'⏰ Las reuniones no están a la misma hora para todos los asistentes'});
  }

  return alerts;
}

function renderAlerts(patIdx) {
  const alerts = validatePattern(patIdx);
  const container = document.getElementById('alerts-container');
  if (alerts.length===0) { container.innerHTML=''; return; }
  container.innerHTML = alerts.map(a =>
    `<div class="alert alert-${a.type}">${a.msg}<button class="dismiss" onclick="this.closest('.alert').remove()">✕</button></div>`
  ).join('');
}

// ═══════════════════════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════════════════════
function buildScheduleTable(patIdx) {
  const rows = currentState[patIdx];
  const leads = rows.filter(r=>r.role==='Lead');
  const mgrs = rows.filter(r=>r.role==='Manager');
  const totalCols = TIME_SLOTS.length + 3; // role + shift + time slots + actions
  let h = '<div class="table-wrapper"><table id="sched-table"><thead><tr class="header-row">';
  h += '<th class="col-role">Rol</th><th class="col-shift">Turno</th>';
  for (const t of TIME_SLOTS) h += `<th class="time-slot"><div class="rw"><span>${t}</span></div></th>`;
  h += '<th class="col-actions"></th>';
  h += '</tr></thead><tbody>';
  h += '<tr class="apertura-row"><td class="col-role">Horario</td><td class="col-shift">Apertura</td>';
  for (let i=0;i<TIME_SLOTS.length;i++) h += i>=OPEN_START&&i<=getOpenEnd()?'<td class="open-slot">▶</td>':'<td></td>';
  h += '<td class="col-actions"></td></tr>';
  h += `<tr class="group-label-row"><td colspan="${totalCols}">👤 Leads (${leads.length})</td></tr>`;
  leads.forEach(row => { h += buildPersonRow(patIdx, rows.indexOf(row), row, 'lead-row'); });
  h += `<tr class="section-sep"><td colspan="${totalCols}"></td></tr>`;
  h += `<tr class="group-label-row"><td colspan="${totalCols}">👔 Managers (${mgrs.length})</td></tr>`;
  mgrs.forEach(row => { h += buildPersonRow(patIdx, rows.indexOf(row), row, 'mgr-row'); });
  h += '</tbody></table></div>';
  return h;
}

function buildPersonRow(patIdx, rowIdx, row, cls) {
  let h = `<tr class="${cls}" data-pat="${patIdx}" data-row="${rowIdx}">`;
  h += `<td class="col-role">${esc(row.role)}</td><td class="col-shift">${esc(row.shift)}</td>`;
  for (let c=0;c<TIME_SLOTS.length;c++) {
    const a=row.acts[c], bg=getColor(a), fg=textColor(bg);
    h += `<td class="act-cell" data-pat="${patIdx}" data-row="${rowIdx}" data-col="${c}" style="background:${bg};color:${fg}" onclick="cellClick(event,${patIdx},${rowIdx},${c})">${esc(a)}</td>`;
  }
  h += `<td class="col-actions"><button class="del-btn" title="Eliminar persona" onclick="deletePerson(${patIdx},${rowIdx})">✕</button></td>`;
  return h+'</tr>';
}

// ── Summary ──────────────────────────────────────────────────────────────────
function calcSummary(patIdx) {
  const rows = currentState[patIdx], n = TIME_SLOTS.length;
  const c = {LDSup:new Array(n).fill(0),LDOPS:new Array(n).fill(0),Coach:new Array(n).fill(0),MgrSup:new Array(n).fill(0),AOR:new Array(n).fill(0),Lunch:new Array(n).fill(0),DD:new Array(n).fill(0),MEETING:new Array(n).fill(0)};
  for (const row of rows) {
    for (let i=0;i<n;i++) {
      const a=row.acts[i];
      if (a==='LDSup') c.LDSup[i]++;
      else if (a==='LDOPS') c.LDOPS[i]++;
      else if (a==='Coach') c.Coach[i]++;
      else if (a==='Support'&&row.role==='Manager') c.MgrSup[i]++;
      else if (a==='AOR') c.AOR[i]++;
      else if (a==='Lunch') c.Lunch[i]++;
      else if (a==='DD') c.DD[i]++;
      else if (a==='MEETING') c.MEETING[i]++;
    }
  }
  const TotalSupport = c.LDSup.map((v,i)=>v+c.MgrSup[i]);
  const TotalFloor = TotalSupport.map((v,i)=>v+c.Coach[i]);
  const MgrsOnFloor = c.Coach.map((v,i)=>v+c.MgrSup[i]);
  const hasMeeting = c.MEETING.some(v=>v>0);
  return {counts:c, TotalSupport, TotalFloor, MgrsOnFloor, hasMeeting};
}

function buildSummaryTable(patIdx) {
  const {counts:c, TotalSupport, TotalFloor, MgrsOnFloor, hasMeeting} = calcSummary(patIdx);
  const n = TIME_SLOTS.length;
  function heatCls(v, max) {
    if (v===0) return '';
    const pct = max>0 ? v/max : 0;
    if (pct<=0.25) return 'sum-heat-low';
    if (pct<=0.5) return 'sum-heat-med';
    if (pct<=0.75) return 'sum-heat-high';
    return 'sum-heat-max';
  }
  function mkRow(label, arr, extra='', heat=false) {
    const mx = heat ? Math.max(...arr) : 0;
    let r = `<tr class="${extra}"><td class="sum-label">${label}</td>`;
    for (let i=0;i<n;i++) {
      const v=arr[i];
      let cls = v===0?'sum-zero':'sum-pos';
      if (extra==='sum-total' && v===0 && i>=OPEN_START && i<=getOpenEnd()) cls='sum-alert';
      if (heat && v>0) cls += ' ' + heatCls(v, mx);
      r += `<td class="sum-val ${cls}">${v===0?'':v}</td>`;
    }
    return r+'</tr>';
  }
  let h = '<div class="summary-section"><h3>📊 Resumen · ' + getSeasonLabel() + '</h3><table class="summary-table"><thead><tr>';
  h += '<th class="sum-label">Actividad</th>';
  for (const t of TIME_SLOTS) h += `<th>${t}</th>`;
  h += '</tr></thead><tbody>';
  h += mkRow('LDSup (Leads)',c.LDSup,'',true);
  h += mkRow('LDOPS',c.LDOPS);
  h += mkRow('Coach',c.Coach,'',true);
  h += mkRow('MGR Support',c.MgrSup,'',true);
  h += mkRow('AOR',c.AOR);
  h += mkRow('Lunch',c.Lunch);
  h += mkRow('DD',c.DD);
  if (hasMeeting) h += mkRow('MEETING',c.MEETING);
  h += `<tr class="sum-sep"><td class="sum-label"></td>${'<td></td>'.repeat(n)}</tr>`;
  h += mkRow('Total Support (LDSup+MGR)',TotalSupport,'sum-total',true);
  h += mkRow('Total Coach',c.Coach,'sum-total',true);
  h += mkRow('Total Floor (Sup+Coach)',TotalFloor,'sum-total',true);
  h += mkRow('Mgrs on Floor (Coach+Sup)',MgrsOnFloor,'sum-total',true);
  h += '</tbody></table></div>';
  return h;
}

function buildLegend() {
  let h = '<div class="legend">';
  for (const [act,color] of Object.entries(COLORS)) {
    h += `<div class="legend-item"><div class="legend-swatch" style="background:${color}"></div><span>${act===''?'(vacío)':act}</span></div>`;
  }
  return h+'</div>';
}

function buildRulesSection() {
  let h = '<div class="rules-section"><h3>📋 Reglas y Notas</h3>';
  if (rules.length===0) { h += '<p class="no-rules">No hay reglas definidas. Usa el botón "📋 Reglas" para añadir.</p>'; }
  else {
    rules.forEach((r,i) => {
      h += `<div class="rule-card ${r.highlight?'highlighted':''}">
        <span class="rule-day">${esc(r.day)}</span>
        <span class="rule-text">${esc(r.text)}</span>
        <button class="rule-delete" onclick="deleteRule(${i})">✕</button>
      </div>`;
    });
  }
  return h+'</div>';
}

// ── Quick Stats ──────────────────────────────────────────────────────────────
function buildQuickStats(patIdx) {
  const rows = currentState[patIdx];
  const leads = rows.filter(r=>r.role==='Lead').length;
  const mgrs = rows.filter(r=>r.role==='Manager').length;
  const {TotalFloor, TotalSupport} = calcSummary(patIdx);
  const openEnd = getOpenEnd();
  let floorSum=0, floorCount=0, minFloor=Infinity, peakFloor=0;
  for (let i=OPEN_START; i<=openEnd; i++) {
    floorSum += TotalFloor[i]; floorCount++;
    if (TotalFloor[i] < minFloor) minFloor = TotalFloor[i];
    if (TotalFloor[i] > peakFloor) peakFloor = TotalFloor[i];
  }
  const avgFloor = floorCount>0 ? (floorSum/floorCount).toFixed(1) : '0';
  if (minFloor === Infinity) minFloor = 0;
  return `
    <div class="stat-card"><div class="stat-value">${leads}</div><div class="stat-label">Leads</div></div>
    <div class="stat-card"><div class="stat-value">${mgrs}</div><div class="stat-label">Managers</div></div>
    <div class="stat-card"><div class="stat-value">${leads+mgrs}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-value">${avgFloor}</div><div class="stat-label">Media Floor</div></div>
    <div class="stat-card"><div class="stat-value">${peakFloor}</div><div class="stat-label">Pico Floor</div></div>
    <div class="stat-card"><div class="stat-value${minFloor===0?' danger':''}">${minFloor}</div><div class="stat-label">Mín Floor</div></div>
    <div class="stat-card"><div class="stat-value">${getSeasonLabel()}</div><div class="stat-label">Cierre ${getCloseTime()}</div></div>
  `;
}

// ── Main render ──────────────────────────────────────────────────────────────
function render(patIdx) {
  closeDropdown();
  const seasonTag = activeSeason === 'invierno' ? ' · ❄️ Invierno' : ' · ☀️ Verano';
  document.getElementById('subtitle').textContent = PATTERN_NAMES[patIdx] + seasonTag;
  renderAlerts(patIdx);
  document.getElementById('quick-stats').innerHTML = buildQuickStats(patIdx);
  document.getElementById('schedule-container').innerHTML =
    buildScheduleTable(patIdx) + buildSummaryTable(patIdx) + buildLegend() + buildRulesSection();
}

document.querySelectorAll('.tab-btn').forEach(btn => {

// ═══════════════════════════════════════════════════════════════════════════════
// CELL EDITING
// ═══════════════════════════════════════════════════════════════════════════════
function closeDropdown() {
  if (openDropdownEl) {
    const cell = openDropdownEl.closest('td.act-cell');
    openDropdownEl.remove();
    openDropdownEl = null;
    if (cell) {
      const p=+cell.dataset.pat, r=+cell.dataset.row, c=+cell.dataset.col;
      const a=currentState[p][r].acts[c], bg=getColor(a), fg=textColor(bg);
      cell.style.background=bg; cell.style.color=fg; cell.textContent=a;
    }
  }
}

function cellClick(evt, patIdx, rowIdx, colIdx) {
  evt.stopPropagation();
  if (openDropdownEl) {
    const ex=openDropdownEl.closest('td');
    if (ex&&+ex.dataset.row===rowIdx&&+ex.dataset.col===colIdx&&+ex.dataset.pat===patIdx) { closeDropdown(); return; }
    closeDropdown();
  }
  const cell=evt.currentTarget, curAct=currentState[patIdx][rowIdx].acts[colIdx];
  const wrap=document.createElement('div'); wrap.className='act-select-wrap';
  const sel=document.createElement('select'); sel.className='act-select';
  for (const opt of ACTIVITY_OPTIONS) {
    const o=document.createElement('option'); o.value=opt; o.textContent=opt===''?'(vacío)':opt;
    if (opt===curAct) o.selected=true; sel.appendChild(o);
  }
  sel.addEventListener('change', e => {
    const nw=e.target.value;
    currentState[patIdx][rowIdx].acts[colIdx]=nw;
    const bg=getColor(nw), fg=textColor(bg);
    cell.style.background=bg; cell.style.color=fg; cell.textContent=nw;
    closeDropdown();
    saveState();
    // Re-render summary & alerts
    const sc=document.querySelector('.summary-section');
    if (sc) { const t=document.createElement('div'); t.innerHTML=buildSummaryTable(patIdx); sc.replaceWith(t.firstChild); }
    renderAlerts(patIdx);
  });
  sel.addEventListener('blur', ()=>setTimeout(closeDropdown,120));
  wrap.appendChild(sel);
  cell.style.position='relative'; cell.style.overflow='visible';
  cell.appendChild(wrap);
  openDropdownEl=wrap;
  sel.focus();
}

document.addEventListener('click', e => { if (openDropdownEl&&!openDropdownEl.contains(e.target)) closeDropdown(); });

// ═══════════════════════════════════════════════════════════════════════════════
// SEASON TOGGLE
// ═══════════════════════════════════════════════════════════════════════════════
function switchSeason(season) {
  if (season === activeSeason) return;
  // Save current state for current season
  allSeasonState[activeSeason] = currentState;
  try { localStorage.setItem(LS_KEY_PATTERNS, JSON.stringify(allSeasonState)); } catch(e) {}
  // Switch
  activeSeason = season;
  currentState = allSeasonState[activeSeason];
  try { localStorage.setItem(LS_KEY_SEASON, season); } catch(e) {}
  // Update button UI
  document.querySelectorAll('.season-btn').forEach(b => b.classList.toggle('active', b.dataset.season === season));
  render(activePattern);
}

function toggleTheme() {
  const isDark = document.body.classList.toggle('dark');
  try { localStorage.setItem(LS_KEY_THEME, isDark ? 'dark' : 'light'); } catch(e) {}
  document.getElementById('theme-toggle').textContent = isDark ? '☀️ Claro' : '🌙 Oscuro';
}
// Restore theme on load
(function() {
  try {
    if (localStorage.getItem(LS_KEY_THEME) === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('theme-toggle').textContent = '☀️ Claro';
    }
  } catch(e) {}
})();

// ═══════════════════════════════════════════════════════════════════════════════
// DELETE PERSON
// ═══════════════════════════════════════════════════════════════════════════════
function deletePerson(patIdx, rowIdx) {
  const row = currentState[patIdx][rowIdx];
  if (!row) return;
  if (!confirm(`¿Eliminar ${row.role} (${row.shift}) de este patrón?`)) return;
  currentState[patIdx].splice(rowIdx, 1);
  saveState();
  render(activePattern);
}

// ADD FIGURE
// ═══════════════════════════════════════════════════════════════════════════════
function addFigure() {
  const role  = document.getElementById('add-role').value;
  const shift = document.getElementById('add-shift').value;
  const [si,ei] = shiftIndices(shift);
  const acts = new Array(TIME_SLOTS.length).fill('');
  // Fill defaults
  for (let i=si; i<ei && i<TIME_SLOTS.length; i++) {
    if (TIME_SLOTS[i]==='09:15') acts[i]='DD';
    else acts[i] = role==='Lead'?'LDSup':'AOR';
  }
  currentState[activePattern].push({role, shift, acts});
  saveState();
  closeModal('modal-add');
  render(activePattern);
}

// ═══════════════════════════════════════════════════════════════════════════════
// GENERATE PATTERN
// ═══════════════════════════════════════════════════════════════════════════════
function generatePattern() {
  const rows = currentState[activePattern];
  const n = TIME_SLOTS.length;
  // Collect existing meetings to preserve
  const meetingMap = rows.map(row => {
    const slots = [];
    for (let c=0;c<n;c++) if (row.acts[c]==='MEETING') slots.push(c);
    return slots;
  });

  let lunchSlot = 0; // Stagger lunches
  rows.forEach((row, ri) => {
    const [si,ei] = shiftIndices(row.shift);
    const isLead = row.role==='Lead';
    const hasMtg = meetingMap[ri].length>0;
    const totalWorkSlots = ei - si;

    // Reset all
    for (let c=0;c<n;c++) row.acts[c]='';

    // DD at 09:15
    if (si<=5 && ei>5) row.acts[5]='DD';

    // Preserve meetings
    if (hasMtg) meetingMap[ri].forEach(c => row.acts[c]='MEETING');

    // Assign lunch (2 consecutive slots, staggered)
    const lunchOptions = [];
    for (let c=si+3; c<ei-3 && c<n-1; c++) {
      if (row.acts[c]===''&&row.acts[c+1]==='') lunchOptions.push(c);
    }
    const lunchIdx = lunchSlot % Math.max(lunchOptions.length,1);
    if (lunchOptions.length>0) {
      const lc = lunchOptions[lunchIdx];
      row.acts[lc]='Lunch'; row.acts[lc+1]='Lunch';
    }
    lunchSlot++;

    // Fill remaining
    for (let c=si; c<ei && c<n; c++) {
      if (row.acts[c]!=='') continue;
      if (isLead) {
        // LDOPS at edges, LDSup in middle
        if (c<si+3 || c>=ei-3) row.acts[c]='LDOPS';
        else row.acts[c]='LDSup';
      } else {
        // Managers: AOR at edges, alternate Coach/Support
        if (c<si+2 || c>=ei-2) row.acts[c]='AOR';
        else row.acts[c] = (ri%2===0)?'Coach':'Support';
      }
    }
  });

  saveState();
  closeModal('modal-gen');
  render(activePattern);
}

// ═══════════════════════════════════════════════════════════════════════════════
// RULES
// ═══════════════════════════════════════════════════════════════════════════════
function addRule() {
  const day  = document.getElementById('rule-day').value;
  const text = document.getElementById('rule-text').value.trim();
  const highlight = document.getElementById('rule-highlight').checked;
  if (!text) return;
  rules.push({day, text, highlight});
  saveRules();
  document.getElementById('rule-text').value='';
  document.getElementById('rule-highlight').checked=false;
  closeModal('modal-rules');
  render(activePattern);
}

function deleteRule(idx) {
  if (!confirm('¿Eliminar esta regla?')) return;
  rules.splice(idx,1);
  saveRules();
  render(activePattern);
}

// ═══════════════════════════════════════════════════════════════════════════════
// EXPORT CSV
// ═══════════════════════════════════════════════════════════════════════════════
function exportCSV() {
  const rows = currentState[activePattern];
  const header = ['Role','Shift',...TIME_SLOTS].join(';');
  const lines = rows.map(r => [r.role,r.shift,...r.acts].join(';'));
  const csv = [header,...lines].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeName = PATTERN_NAMES[activePattern].replace(/[^a-zA-Z0-9]/g,'_');
  a.href=url; a.download=`patron_${activeSeason}_${activePattern}_${safeName}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════════════════════════
// RESET
// ═══════════════════════════════════════════════════════════════════════════════
function resetPattern() {
  const label = PATTERN_NAMES[activePattern] + (activeSeason==='invierno'?' (Invierno)':' (Verano)');
  if (!confirm(`¿Restaurar el patrón "${label}" a los datos originales?`)) return;
  const originals = activeSeason === 'invierno' ? ORIGINAL_WINTER_PATTERNS : ORIGINAL_PATTERNS;
  currentState[activePattern] = originals[activePattern].map(row => ({role:row.role, shift:row.shift, acts:[...row.acts]}));
  saveState();
  render(activePattern);
}
