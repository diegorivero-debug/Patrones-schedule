<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1557b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3d91;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgGrad)" />

  <!-- Calendar body -->
  <rect x="72" y="120" width="368" height="312" rx="24" ry="24" fill="white" opacity="0.95" />

  <!-- Calendar header bar -->
  <rect x="72" y="120" width="368" height="80" rx="24" ry="24" fill="url(#headerGrad)" />
  <rect x="72" y="160" width="368" height="40" fill="url(#headerGrad)" />

  <!-- Ring pegs -->
  <rect x="160" y="88" width="28" height="60" rx="14" ry="14" fill="#0d47a1" />
  <rect x="324" y="88" width="28" height="60" rx="14" ry="14" fill="#0d47a1" />

  <!-- "LS" text in header -->
  <text x="256" y="178" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif"
        font-size="56" font-weight="800" fill="white"
        text-anchor="middle" dominant-baseline="middle"
        letter-spacing="-2">LS</text>

  <!-- Calendar grid dots (3 rows x 5 cols) -->
  <!-- Row 1 -->
  <circle cx="144" cy="272" r="10" fill="#1a73e8" opacity="0.7"/>
  <circle cx="208" cy="272" r="10" fill="#1a73e8" opacity="0.7"/>
  <circle cx="272" cy="272" r="10" fill="#1a73e8" opacity="0.7"/>
  <circle cx="336" cy="272" r="10" fill="#1a73e8" opacity="0.7"/>
  <circle cx="400" cy="272" r="10" fill="#1a73e8" opacity="0.7"/>
  <!-- Row 2 -->
  <circle cx="144" cy="336" r="10" fill="#1a73e8" opacity="0.7"/>
  <circle cx="208" cy="336" r="10" fill="#1a73e8" opacity="0.7"/>
  <circle cx="272" cy="336" r="10" fill="#e53935" />
  <circle cx="336" cy="336" r="10" fill="#1a73e8" opacity="0.7"/>
  <circle cx="400" cy="336" r="10" fill="#1a73e8" opacity="0.7"/>
  <!-- Row 3 -->
  <circle cx="144" cy="400" r="10" fill="#1a73e8" opacity="0.7"/>
  <circle cx="208" cy="400" r="10" fill="#1a73e8" opacity="0.7"/>
  <circle cx="272" cy="400" r="10" fill="#1a73e8" opacity="0.7"/>
  <circle cx="336" cy="400" r="10" fill="#1a73e8" opacity="0.7"/>
  <circle cx="400" cy="400" r="10" fill="#1a73e8" opacity="0.7"/>
</svg>
